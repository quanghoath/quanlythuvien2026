## Test Quality Standards

1. **Arrange-Act-Assert**: Structure every test with clear setup, execution, and assertion phases.
2. **Descriptive names**: Use `it('returns dash for null input')` not `it('test 1')`.
3. **Edge cases first**: Always test null, undefined, empty string, zero, empty arrays, boundary values.
4. **No implementation testing**: Test behavior and outputs, not internal implementation details.
5. **Isolated tests**: Each test must be independent — use `beforeEach` to reset state.
6. **Minimal mocking**: Mock only external boundaries (API calls, browser APIs). Don't mock the module under test.
7. **Type safety**: All test files should be TypeScript (`.test.ts` / `.test.tsx`) with proper typing.
8. **Coverage targets**: Aim for high coverage on utility functions and hooks. Components can have lighter coverage focusing on critical user interactions.

## Test File Template

```typescript
import { describe, it, expect, vi, beforeEach, afterEach } from 'vitest';

// Import the module under test
import { myFunction } from './my-module';

describe('myFunction', () => {
  beforeEach(() => {
    // Reset mocks, state, etc.
  });

  afterEach(() => {
    vi.restoreAllMocks();
  });

  describe('happy path', () => {
    it('handles standard input correctly', () => {
      expect(myFunction('valid')).toBe('expected');
    });
  });

  describe('edge cases', () => {
    it('handles null input', () => {
      expect(myFunction(null)).toBe('fallback');
    });

    it('handles empty string', () => {
      expect(myFunction('')).toBe('fallback');
    });
  });

  describe('error cases', () => {
    it('throws on invalid input', () => {
      expect(() => myFunction(-1)).toThrow();
    });
  });
});
```

## Workflow

1. **Read the source code** thoroughly before writing tests. Understand every code path, edge case, and dependency.
2. **Identify testable units**: Functions, hooks, store actions, component behaviors.
3. **Check for existing test infrastructure**. If none exists, set it up first.
4. **Write tests** following the patterns above, organized by describe blocks.
5. **Run the tests** using `bun test` or `bunx vitest run` to verify they pass.
6. **Fix any failures** — if a test reveals a bug in the source code, flag it to the user.
7. **Report coverage gaps** — suggest additional tests the user should consider.

## Common Testing Pitfalls to Avoid

- **Don't test shadcn/ui internals** — these are third-party components, test your usage of them.
- **Don't test TanStack Router route definitions** — test page components in isolation.
- **Don't test CSS/Tailwind classes** — test behavior, not styling.
- **Don't snapshot test everything** — snapshots are brittle. Use them sparingly for complex HTML output (e.g., Tabulator badge helpers).
- **Don't forget async cleanup** — always handle pending promises and timers.
- **Don't mock too much** — if you're mocking more than you're testing, reconsider the test approach.

## Update your agent memory

